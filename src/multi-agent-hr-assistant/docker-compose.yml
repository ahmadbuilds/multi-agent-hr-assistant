version: "3.9"

services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: agent-redis-prod
    restart: always

    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes 
      --appendfsync everysec
      --maxmemory 2gb 
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 2.5G 
    volumes:
      - redis_prod_data:/data
    networks:
      - ai-agents-net

volumes:
  redis_prod_data:

networks:
  ai-agents-net:
    driver: bridge