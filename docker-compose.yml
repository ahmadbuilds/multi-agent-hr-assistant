version: "3.9"

services:
  # Redis service for caching and pub/sub
  redis:
    image: redis/redis-stack-server:latest
    container_name: agent-redis-prod
    restart: always
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD:-redis_password}
      --appendonly yes 
      --appendfsync everysec
      --maxmemory 2gb 
      --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_password}
    deploy:
      resources:
        limits:
          memory: 2.5G
        reservations:
          memory: 1G
    volumes:
      - redis_prod_data:/data
    networks:
      - ai-agents-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  # FastAPI Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent-backend-prod
    restart: always
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      # Node Environment
      - NODE_ENV=production
      # Python Settings
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      # API Configuration
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      # Redis Configuration
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis_password}
      # Supabase Configuration
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      # LLM Configuration
      - GROQ_API_KEY=${GROQ_API_KEY}
      - MOCK_API_KEY_CLERK=${MOCK_API_KEY_CLERK}
      # Database
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src/multi-agent-hr-assistant:/app/src/multi-agent-hr-assistant
      - ./data:/app/data
    networks:
      - ai-agents-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Optional: Nginx reverse proxy
  # nginx:
  #   image: nginx:alpine
  #   container_name: agent-nginx
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   networks:
  #     - ai-agents-net
  #   depends_on:
  #     - backend

volumes:
  redis_prod_data:
    driver: local

networks:
  ai-agents-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
